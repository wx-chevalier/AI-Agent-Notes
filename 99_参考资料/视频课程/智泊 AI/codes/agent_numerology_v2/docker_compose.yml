version: '3.8'

services:
  numerology:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/
    depends_on:
      - redis
    volumes:
      - ./local_qdrand:/app/local_qdrand

  redis:
    image: redis:latest  # 修改为redis:latest
    ports:
      - "6380:6379"
